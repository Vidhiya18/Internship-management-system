<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h2 { color: #333; }
        input { margin-bottom: 10px; padding: 5px; width: 250px; }
        button { padding: 5px 10px; margin-bottom: 20px; cursor: pointer; }
        hr { margin: 20px 0; }
        #studentsList { margin-top: 20px; }
        table, th, td { border: 1px solid black; border-collapse: collapse; padding: 5px; }
    </style>
</head>
<body>
    <h1>Student Management System</h1>

    <!-- Add Student -->
    <h2>Add Student</h2>
    <input type="text" id="name" placeholder="Enter Name"><br>
    <input type="email" id="email" placeholder="Enter Email"><br>
    <input type="text" id="password" placeholder="Enter Password"><br>
    <button onclick="addStudent()">Add Student</button>
    <p id="addMessage"></p>
    <hr>

    <!-- Get Students -->
    <h2>All Students</h2>
    <button onclick="getStudents()">Refresh List</button>
    <div id="studentsList"></div>
    <hr>

    <!-- Update Student -->
    <h2>Update Student</h2>
    <input type="number" id="studentId" placeholder="Enter Student ID"><br>
    <input type="text" id="updateName" placeholder="Enter Name"><br>
    <input type="email" id="updateEmail" placeholder="Enter Email"><br>
    <input type="text" id="updatePassword" placeholder="Enter Password"><br>
    <button onclick="updateStudent()">Update Student</button>
    <p id="updateMessage"></p>
    <hr>

    <!-- Delete Student -->
    <h2>Delete Student</h2>
    <input type="number" id="deleteId" placeholder="Enter Student ID"><br>
    <button onclick="deleteStudent()">Delete Student</button>
    <p id="deleteMessage"></p>

    <script>
        const baseUrl = 'http://localhost:8080/students';

        // ADD Student
        function addStudent() {
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            fetch(baseUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById("addMessage").innerText = "Student added successfully!";
                console.log(data);
                getStudents(); // refresh list
            })
            .catch(err => console.error(err));
        }

        // GET Students
        function getStudents() {
            fetch(baseUrl)
            .then(res => res.json())
            .then(data => {
                let html = '<table><tr><th>ID</th><th>Name</th><th>Email</th><th>Password</th></tr>';
                data.forEach(s => {
                    html += `<tr>
                                <td>${s.id}</td>
                                <td>${s.name}</td>
                                <td>${s.email}</td>
                                <td>${s.password}</td>
                             </tr>`;
                });
                html += '</table>';
                document.getElementById("studentsList").innerHTML = html;
            })
            .catch(err => console.error(err));
        }

        // UPDATE Student
        function updateStudent() {
            const id = document.getElementById("studentId").value;
            const name = document.getElementById("updateName").value;
            const email = document.getElementById("updateEmail").value;
            const password = document.getElementById("updatePassword").value;

            fetch(`${baseUrl}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            })
            .then(response => {
                if(response.ok) return response.json();
                else throw new Error("Student not found or server error");
            })
            .then(data => {
                document.getElementById("updateMessage").innerText = "Student updated successfully!";
                console.log(data);
                getStudents(); // refresh list
            })
            .catch(err => {
                document.getElementById("updateMessage").innerText = "Error updating student.";
                console.error(err);
            });
        }

        // DELETE Student
        function deleteStudent() {
            const id = document.getElementById("deleteId").value;

            fetch(`${baseUrl}/${id}`, { method: 'DELETE' })
            .then(res => {
                document.getElementById("deleteMessage").innerText = "Student deleted successfully!";
                getStudents(); // refresh list
            })
            .catch(err => {
                document.getElementById("deleteMessage").innerText = "Error deleting student.";
                console.error(err);
            });
        }

        // Load students initially
        window.onload = getStudents;
        <button onclick="goAdmin()">Admin</button>
    </script>
</body>
</html>
