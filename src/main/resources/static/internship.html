<!DOCTYPE html>
<html>
<head>
    <title>Internship Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Apply Internship</h2>

<input type="text" id="title" placeholder="Title"><br><br>
<input type="text" id="domain" placeholder="Domain"><br><br>
<input type="text" id="studentName" placeholder="Student Name"><br><br>
<input type="email" id="email" placeholder="Email"><br><br>
<input type="text" id="collegeName" placeholder="College"><br><br>
<input type="date" id="startDate"><br><br>
<input type="date" id="endDate"><br><br>
<input type="text" id="duration" placeholder="Duration"><br><br>
<input type="text" id="description" placeholder="Description"><br><br>

<button onclick="applyInternship()">Submit</button>
<button onclick="goBack()">Back</button>
<br>
<button class="next-btn" onclick="goMentor()">Next ➡</button>
<script src="script.js"></script>
</body>
</html>
